org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.workers.max=1
android.useAndroidX=true
# Limit Gradle worker concurrency so AGP does not try to start multiple AAPT2
# daemons in parallel on slower or contended machines. This reduces intermittent
# Android Studio debug-build timeouts in processDebugResources / AAR transforms.
