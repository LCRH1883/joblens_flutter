			);
			name = "Re-sign Native Asset Frameworks";
			outputPaths = (
				"$(DERIVED_FILE_DIR)/native-asset-frameworks-resigned.stamp",
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "set -eu\n\nSTAMP_FILE=\"${SCRIPT_OUTPUT_FILE_0}\"\nmkdir -p \"$(dirname \"$STAMP_FILE\")\"\n\nif [ \"${CODE_SIGNING_ALLOWED:-NO}\" != \"YES\" ]; then\n  echo \"Skipping native asset codesign: code signing disabled\"\n  touch \"$STAMP_FILE\"\n  exit 0\nfi\n\nif [ -z \"${EXPANDED_CODE_SIGN_IDENTITY:-}\" ]; then\n  echo \"Skipping native asset codesign: no signing identity\"\n  touch \"$STAMP_FILE\"\n  exit 0\nfi\n\nFRAMEWORKS_DIR=\"${TARGET_BUILD_DIR}/${WRAPPER_NAME}/Frameworks\"\nif [ ! -d \"$FRAMEWORKS_DIR\" ]; then\n  touch \"$STAMP_FILE\"\n  exit 0\nfi\n\nfor FRAMEWORK in \"$FRAMEWORKS_DIR\"/*.framework; do\n  [ -d \"$FRAMEWORK\" ] || continue\n  PLIST=\"$FRAMEWORK/Info.plist\"\n  if [ ! -f \"$PLIST\" ]; then\n    continue\n  fi\n\n  IDENTIFIER=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' \"$PLIST\" 2>/dev/null || true)\n  case \"$IDENTIFIER\" in\n    io.flutter.flutter.native-assets.*)\n      echo \"Codesigning native asset framework $(basename \"$FRAMEWORK\")\"\n      /usr/bin/codesign --force --sign \"$EXPANDED_CODE_SIGN_IDENTITY\" --preserve-metadata=identifier,entitlements,flags --generate-entitlement-der \"$FRAMEWORK\"\n      ;;\n  esac\ndone\n\ntouch \"$STAMP_FILE\"\n";
			showEnvVarsInLog = 0;
		};
